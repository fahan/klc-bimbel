  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  #E5EFE7;\n\n  --klc-rose:         #C4615C;     /* tertiary — warmth, family */\n  --klc-rose-50:      #F7E4E2;\n\n  --klc-sun:          #E8B845;     /* highlight — joyful */\n  --klc-sun-50:       #FBF1D7;\n\n  --klc-shadow-sm:    0 1px 2px rgba(74, 50, 24, 0.06), 0 0 0 1px rgba(74, 50, 24, 0.04);\n  --klc-shadow:       0 4px 14px rgba(74, 50, 24, 0.08), 0 1px 3px rgba(74, 50, 24, 0.05);\n  --klc-shadow-lg:    0 18px 50px rgba(74, 50, 24, 0.12), 0 6px 16px rgba(74, 50, 24, 0.06);\n\n  --klc-font:         \"Plus Jakarta Sans\", \"Nunito\", system-ui, sans-serif;\n  --klc-serif:        \"Fraunces\", \"DM Serif Display\", Georgia, serif;\n}\n\n* { box-sizing: border-box; }\n\n.klc {\n  font-family: var(--klc-font);\n  color: var(--klc-ink);\n  background: var(--klc-cream);\n  line-height: 1.55;\n  -webkit-font-smoothing: antialiased;\n}\n\n.klc h1, .klc h2, .klc h3, .klc h4 { margin: 0; line-height: 1.15; letter-spacing: -0.02em; }\n.klc h1 { font-family: var(--klc-serif); font-weight: 600; font-size: clamp(40px, 5.5vw, 72px); letter-spacing: -0.025em; }\n.klc h2 { font-family: var(--klc-serif); font-weight: 600; font-size: clamp(30px, 3.5vw, 46px); }\n.klc h3 { font-family: var(--klc-serif); font-weight: 600; font-size: 22px; }\n.klc h4 { font-weight: 600; font-size: 16px; letter-spacing: -0.01em; }\n.klc p  { margin: 0; }\n\n.klc-container { max-width: 1200px; margin: 0 auto; padding: 0 32px; }\n\n/* ============================================================\n   Nav\n   ============================================================ */\n.klc-nav {\n  position: sticky; top: 0; z-index: 50;\n  background: rgba(251, 246, 236, 0.85);\n  backdrop-filter: saturate(140%) blur(14px);\n  -webkit-backdrop-filter: saturate(140%) blur(14px);\n  border-bottom: 1px solid var(--klc-line);\n}\n.klc-nav-inner { display: flex; align-items: center; gap: 36px; height: 72px; }\n.klc-logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 18px; letter-spacing: -0.01em; }\n.klc-logo-mark {\n  width: 36px; height: 36px; border-radius: 10px;\n  background: linear-gradient(135deg, var(--klc-orange), var(--klc-rose));\n  display: grid; place-items: center; color: white;\n  font-family: var(--klc-serif); font-size: 18px; font-weight: 600;\n  box-shadow: 0 2px 8px rgba(224, 122, 59, 0.35);\n}\n.klc-logo small { display: block; font-size: 11px; font-weight: 500; color: var(--klc-ink-3); letter-spacing: 0.03em; text-transform: uppercase; }\n.klc-nav-links { display: flex; gap: 28px; margin-left: 12px; }\n.klc-nav-links a { color: var(--klc-ink-2); text-decoration: none; font-size: 14px; font-weight: 500; transition: color .15s; }\n.klc-nav-links a:hover { color: var(--klc-orange-700); }\n.klc-nav-cta { margin-left: auto; display: flex; gap: 10px; }\n\n/* ============================================================\n   Buttons\n   ============================================================ */\n.klc-btn {\n  display: inline-flex; align-items: center; gap: 8px;\n  padding: 12px 22px; border-radius: 999px;\n  font-family: var(--klc-font); font-size: 14.5px; font-weight: 600;\n  border: 1px solid transparent; cursor: pointer;\n  transition: transform .12s, box-shadow .12s, background .15s;\n  text-decoration: none;\n}\n.klc-btn--primary {\n  background: var(--klc-orange); color: white;\n  box-shadow: 0 4px 14px rgba(224, 122, 59, 0.35), inset 0 1px 0 rgba(255,255,255,0.18);\n}\n.klc-btn--primary:hover { background: var(--klc-orange-700); transform: translateY(-1px); box-shadow: 0 8px 22px rgba(224, 122, 59, 0.4); }\n.klc-btn--ghost {\n  background: transparent; color: var(--klc-ink); border-color: var(--klc-line-strong);\n}\n.klc-btn--ghost:hover { background: var(--klc-paper); }\n.klc-btn--wa { background: #25D366; color: white; }\n.klc-btn--wa:hover { background: #1FB955; }\n.klc-btn--lg { padding: 16px 28px; font-size: 15.5px; }\n\n/* ============================================================\n   Hero\n   ============================================================ */\n.klc-hero {\n  position: relative;\n  padding: 88px 0 100px;\n  overflow: hidden;\n}\n.klc-hero-bg {\n  position: absolute; inset: 0; z-index: 0; pointer-events: none;\n}\n.klc-hero-bg::before {\n  content: \"\";\n  position: absolute; right: -100px; top: -120px;\n  width: 520px; height: 520px; border-radius: 50%;\n  background: radial-gradient(closest-side, rgba(232, 184, 69, 0.45), transparent 70%);\n}\n.klc-hero-bg::after {\n  content: \"\";\n  position: absolute; left: -160px; bottom: -200px;\n  width: 580px; height: 580px; border-radius: 50%;\n  background: radial-gradient(closest-side, rgba(92, 138, 109, 0.28), transparent 70%);\n}\n.klc-hero-grid {\n  position: relative; z-index: 1;\n  display: grid; grid-template-columns: 1.05fr 1fr; gap: 64px; align-items: center;\n}\n.klc-eyebrow {\n  display: inline-flex; align-items: center; gap: 8px;\n  font-size: 12.5px; font-weight: 600;\n  color: var(--klc-orange-700);\n  background: var(--klc-orange-50);\n  border: 1px solid var(--klc-orange-100);\n  padding: 6px 14px; border-radius: 999px;\n  letter-spacing: 0.02em;\n}\n.klc-eyebrow .pulse {\n  width: 7px; height: 7px; border-radius: 50%; background: var(--klc-orange);\n  box-shadow: 0 0 0 0 rgba(224, 122, 59, 0.4);\n  animation: klc-pulse 2s infinite;\n}\n@keyframes klc-pulse { 0%{box-shadow:0 0 0 0 rgba(224,122,59,0.5)} 70%{box-shadow:0 0 0 8px rgba(224,122,59,0)} 100%{box-shadow:0 0 0 0 rgba(224,122,59,0)} }\n\n.klc-hero h1 { margin-top: 22px; }\n.klc-hero h1 .em { color: var(--klc-orange-700); font-style: italic; }\n.klc-hero-sub { margin-top: 22px; font-size: 18px; line-height: 1.6; color: var(--klc-ink-2); max-width: 520px; }\n.klc-hero-cta { margin-top: 32px; display: flex; gap: 14px; }\n.klc-hero-trust {\n  margin-top: 36px; padding-top: 24px;\n  border-top: 1px solid var(--klc-line);\n  display: flex; gap: 36px;\n}\n.klc-hero-trust > div .num { font-family: var(--klc-serif); font-size: 32px; font-weight: 600; color: var(--klc-ink); letter-spacing: -0.02em; }\n.klc-hero-trust > div .lbl { font-size: 12.5px; color: var(--klc-ink-3); }\n\n/* Hero visual stack */\n.klc-hero-stack { position: relative; height: 560px; }\n.klc-photo {\n  position: absolute;\n  border-radius: 22px;\n  overflow: hidden;\n  box-shadow: var(--klc-shadow-lg);\n  background: var(--klc-paper);\n}\n.klc-photo--main {\n  width: 380px; height: 480px;\n  top: 30px; left: 60px;\n  background: linear-gradient(135deg, #E5C7A3 0%, #C99974 50%, #B8845E 100%);\n  transform: rotate(-2deg);\n}\n.klc-photo--card {\n  width: 270px; height: 200px;\n  bottom: 20px; right: 20px;\n  transform: rotate(4deg);\n  background: white;\n  border: 1px solid var(--klc-line);\n  padding: 18px;\n}\n.klc-photo--badge {\n  width: 168px;\n  position: absolute; top: 60px; right: 0;\n  transform: rotate(5deg);\n  background: white; border-radius: 18px;\n  padding: 14px 16px; box-shadow: var(--klc-shadow);\n  border: 1px solid var(--klc-line);\n}\n.klc-photo-figure {\n  width: 100%; height: 100%;\n  display: grid; place-items: center; color: rgba(255,255,255,0.65);\n  font-size: 14px; letter-spacing: 0.04em;\n}\n\n/* ============================================================\n   Sections\n   ============================================================ */\n.klc-section { padding: 96px 0; position: relative; }\n.klc-section--alt { background: var(--klc-cream-2); }\n.klc-section-head { text-align: center; max-width: 720px; margin: 0 auto 56px; }\n.klc-section-eyebrow {\n  display: inline-block;\n  font-size: 12.5px; font-weight: 600;\n  color: var(--klc-sage-700); letter-spacing: 0.06em; text-transform: uppercase;\n  margin-bottom: 14px;\n  white-space: nowrap;\n}\n.klc-section-sub { margin-top: 18px; font-size: 17px; color: var(--klc-ink-2); line-height: 1.6; }\n\n/* Card — generic */\n.klc-card {\n  background: var(--klc-paper);\n  border: 1px solid var(--klc-line);\n  border-radius: 18px;\n  padding: 24px;\n  box-shadow: var(--klc-shadow-sm);\n}\n\n/* ============================================================\n   Mata Pelajaran\n   ============================================================ */\n.klc-mapel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }\n.klc-mapel {\n  background: var(--klc-paper);\n  border: 1px solid var(--klc-line);\n  border-radius: 20px;\n  padding: 26px 22px;\n  transition: transform .2s, box-shadow .2s, border-color .2s;\n  cursor: pointer;\n  position: relative;\n}\n.klc-mapel:hover { transform: translateY(-3px); box-shadow: var(--klc-shadow); border-color: var(--klc-line-strong); }\n.klc-mapel-icon {\n  width: 56px; height: 56px; border-radius: 14px;\n  display: grid; place-items: center; margin-bottom: 16px;\n  font-size: 28px;\n}\n.klc-mapel--orange .klc-mapel-icon { background: var(--klc-orange-50); color: var(--klc-orange-700); }\n.klc-mapel--sage   .klc-mapel-icon { background: var(--klc-sage-50);   color: var(--klc-sage-700); }\n.klc-mapel--rose   .klc-mapel-icon { background: var(--klc-rose-50);   color: var(--klc-rose); }\n.klc-mapel--sun    .klc-mapel-icon { background: var(--klc-sun-50);    color: #95740F; }\n.klc-mapel h4 { font-family: var(--klc-serif); font-size: 22px; font-weight: 600; }\n.klc-mapel-desc { font-size: 14px; color: var(--klc-ink-2); margin-top: 8px; line-height: 1.55; }\n.klc-mapel-tags { display: flex; gap: 6px; margin-top: 16px; flex-wrap: wrap; }\n.klc-mapel-tag { font-size: 11.5px; padding: 4px 10px; background: var(--klc-cream-2); border-radius: 999px; color: var(--klc-ink-2); }\n\n/* ============================================================\n   Cara Kerja / Mastery\n   ============================================================ */\n.klc-mastery {\n  display: grid; grid-template-columns: 1fr 1.1fr; gap: 64px; align-items: center;\n}\n.klc-mastery-points { display: flex; flex-direction: column; gap: 24px; margin-top: 32px; }\n.klc-mastery-point { display: flex; gap: 16px; }\n.klc-mastery-num {\n  flex-shrink: 0;\n  width: 40px; height: 40px; border-radius: 12px;\n  background: var(--klc-orange); color: white;\n  display: grid; place-items: center;\n  font-family: var(--klc-serif); font-size: 18px; font-weight: 600;\n  box-shadow: 0 4px 12px rgba(224, 122, 59, 0.3);\n}\n.klc-mastery-point h4 { margin-bottom: 4px; }\n.klc-mastery-point p { font-size: 14.5px; color: var(--klc-ink-2); line-height: 1.6; }\n\n/* Module visual */\n.klc-modules {\n  background: var(--klc-paper);\n  border: 1px solid var(--klc-line);\n  border-radius: 24px;\n  padding: 28px;\n  box-shadow: var(--klc-shadow-lg);\n}\n.klc-modules-head { display: flex; align-items: center; gap: 12px; margin-bottom: 22px; padding-bottom: 18px; border-bottom: 1px solid var(--klc-line); }\n.klc-modules-head .student-avatar {\n  width: 44px; height: 44px; border-radius: 50%;\n  background: linear-gradient(135deg, #F4C9A0, #C99974);\n  color: white; display: grid; place-items: center;\n  font-weight: 600; font-size: 14px;\n}\n.klc-modules-head .name { font-weight: 600; font-size: 15px; }\n.klc-modules-head .meta { font-size: 12px; color: var(--klc-ink-3); }\n\n.klc-module-row { display: flex; gap: 14px; padding: 12px 0; border-bottom: 1px solid var(--klc-line); align-items: center; }\n.klc-module-row:last-child { border-bottom: none; }\n.klc-module-check {\n  width: 28px; height: 28px; border-radius: 50%;\n  display: grid; place-items: center;\n  flex-shrink: 0;\n}\n.klc-module-check.done { background: var(--klc-sage); color: white; }\n.klc-module-check.now { background: var(--klc-orange-50); color: var(--klc-orange); border: 2px solid var(--klc-orange); }\n.klc-module-check.next { background: var(--klc-cream-2); color: var(--klc-ink-3); border: 1px dashed var(--klc-line-strong); }\n.klc-module-info { flex: 1; }\n.klc-module-info .t { font-weight: 600; font-size: 14.5px; }\n.klc-module-info .s { font-size: 12px; color: var(--klc-ink-3); margin-top: 2px; }\n.klc-module-row .predikat {\n  font-size: 11px; padding: 3px 9px; border-radius: 999px;\n  background: var(--klc-sage-50); color: var(--klc-sage-700); font-weight: 600;\n}\n.klc-module-row .progress-mini {\n  width: 80px; height: 6px; background: var(--klc-cream-2); border-radius: 999px; overflow: hidden;\n}\n.klc-module-row .progress-mini > div { height: 100%; background: var(--klc-orange); }\n\n/* ============================================================\n   Komitmen\n   ============================================================ */\n.klc-commitment-grid { display: grid; grid-template-columns: 1.2fr 1fr; gap: 56px; align-items: center; }\n.klc-commit-card {\n  background: var(--klc-paper);\n  border: 1px solid var(--klc-line);\n  border-radius: 22px;\n  padding: 28px;\n  box-shadow: var(--klc-shadow);\n  position: relative;\n}\n.klc-commit-list { display: flex; flex-direction: column; gap: 14px; margin-top: 32px; }\n.klc-commit-item { display: flex; gap: 14px; align-items: flex-start; padding: 16px; background: var(--klc-paper); border: 1px solid var(--klc-line); border-radius: 14px; }\n.klc-commit-icon {\n  width: 36px; height: 36px; border-radius: 10px;\n  background: var(--klc-orange-50); color: var(--klc-orange-700);\n  display: grid; place-items: center; flex-shrink: 0;\n}\n.klc-commit-item h4 { margin-bottom: 4px; font-family: var(--klc-font); font-size: 15px; }\n.klc-commit-item p { font-size: 13.5px; color: var(--klc-ink-2); }\n\n/* WhatsApp preview */\n.klc-wa {\n  background: #E5DDD5;\n  border-radius: 20px;\n  padding: 18px;\n  position: relative;\n  background-image: radial-gradient(circle at 20% 30%, rgba(255,255,255,0.4) 0, transparent 50%),\n                    radial-gradient(circle at 80% 70%, rgba(255,255,255,0.3) 0, transparent 50%);\n}\n.klc-wa-head {\n  display: flex; align-items: center; gap: 10px;\n  background: #075E54; color: white;\n  margin: -18px -18px 18px; padding: 14px 18px;\n  border-radius: 20px 20px 0 0; font-size: 14px;\n}\n.klc-wa-head .av { width: 32px; height: 32px; border-radius: 50%; background: rgba(255,255,255,0.2); display: grid; place-items: center; font-weight: 600; }\n.klc-wa-bubble {\n  background: #DCF8C6;\n  padding: 10px 14px;\n  border-radius: 12px 12px 4px 12px;\n  margin-left: auto;\n  max-width: 84%;\n  font-size: 13.5px;\n  line-height: 1.45;\n  box-shadow: 0 1px 1px rgba(0,0,0,0.05);\n  margin-bottom: 8px;\n  color: #2A1F14;\n}\n.klc-wa-bubble .link { color: #1F5BBE; text-decoration: underline; word-break: break-all; font-size: 12.5px; }\n.klc-wa-bubble .time { display: block; font-size: 10.5px; color: #888; text-align: right; margin-top: 4px; }\n.klc-wa-card {\n  background: white; border-radius: 12px; overflow: hidden; max-width: 280px; margin-left: auto;\n  box-shadow: 0 1px 1px rgba(0,0,0,0.05); margin-bottom: 8px;\n}\n.klc-wa-card .preview { background: linear-gradient(135deg, var(--klc-orange), var(--klc-rose)); padding: 14px; color: white; }\n.klc-wa-card .preview .label { font-size: 10px; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.06em; }\n.klc-wa-card .preview .name { font-family: var(--klc-serif); font-size: 18px; font-weight: 600; margin-top: 2px; }\n.klc-wa-card .preview .meta { font-size: 11px; opacity: 0.85; margin-top: 2px; }\n.klc-wa-card .meta-bar { padding: 10px 14px; font-size: 11.5px; color: var(--klc-ink-3); border-top: 1px solid var(--klc-line); }\n\n/* ============================================================\n   Tim Guru\n   ============================================================ */\n.klc-guru-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }\n.klc-guru-card { text-align: center; }\n.klc-guru-photo {\n  width: 100%; aspect-ratio: 4 / 5;\n  border-radius: 20px; overflow: hidden;\n  background: linear-gradient(135deg, #F4D2A8, #C99974);\n  margin-bottom: 14px;\n  position: relative;\n}\n.klc-guru-photo .label {\n  position: absolute; inset: 0;\n  display: grid; place-items: center;\n  color: rgba(255,255,255,0.7); font-size: 13px;\n}\n.klc-guru-card h4 { font-family: var(--klc-serif); font-size: 19px; font-weight: 600; }\n.klc-guru-card .role { font-size: 13px; color: var(--klc-ink-3); margin-top: 4px; }\n.klc-guru-card .pill { display: inline-block; margin-top: 10px; padding: 4px 10px; background: var(--klc-cream-2); border-radius: 999px; font-size: 11.5px; color: var(--klc-ink-2); }\n\n/* ============================================================\n   Galeri\n   ============================================================ */\n.klc-gallery {\n  display: grid;\n  grid-template-columns: 1.4fr 1fr 1fr;\n  grid-template-rows: 200px 200px;\n  gap: 14px;\n}\n.klc-gallery > div {\n  border-radius: 18px;\n  background-size: cover; background-position: center;\n  display: grid; place-items: end start;\n  padding: 16px;\n  color: white; font-size: 12px;\n  position: relative;\n  overflow: hidden;\n}\n.klc-gallery > div::after {\n  content: \"\";\n  position: absolute; inset: 0; z-index: 0;\n  background: linear-gradient(to top, rgba(0,0,0,0.4) 0%, transparent 50%);\n}\n.klc-gallery > div span { position: relative; z-index: 1; }\n.klc-gallery .g1 { grid-row: span 2; background: linear-gradient(135deg, #C99974, #8A6743); }\n.klc-gallery .g2 { background: linear-gradient(135deg, #B89B7E, #735540); }\n.klc-gallery .g3 { background: linear-gradient(135deg, #DCB892, #A37F5C); }\n.klc-gallery .g4 { background: linear-gradient(135deg, #C2A079, #8A6743); }\n.klc-gallery .g5 { background: linear-gradient(135deg, #D9C0A0, #B08C66); }\n\n/* ============================================================\n   Testimoni\n   ============================================================ */\n.klc-testi-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }\n.klc-testi {\n  background: var(--klc-paper);\n  border: 1px solid var(--klc-line);\n  border-radius: 20px;\n  padding: 28px;\n  position: relative;\n}\n.klc-testi-quote {\n  font-family: var(--klc-serif); font-size: 60px;\n  color: var(--klc-orange-100); line-height: 0.6;\n  ma rm:uppercase;letter-spacing:.06em;\">Laporan Mingguan<\u002Fdiv>\n        <div style=\"font-family:var(--klc-serif);font-size:18px;font-weight:600;margin-top:4px;\">96% kehadiran<\u002Fdiv>\n        <div style=\"margin-top:14px;height:6px;background:var(--klc-cream-2);border-radius:999px;overflow:hidden;\">\n          <div style=\"width:96%;height:100%;background:var(--klc-orange);\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"font-size:12px;color:var(--klc-ink-2);margin-top:14px;line-height:1.5;\">\"Aira sangat baik dalam memahami konsep penjumlahan tiga digit minggu ini.\"<\u002Fdiv>\n        <div style=\"font-size:11px;color:var(--klc-ink-3);margin-top:8px;\">— Bu Rini, Guru AHE<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ============== MATA PELAJARAN ============== -->\n<section class=\"klc-section\" id=\"mapel\">\n  <div class=\"klc-container\">\n    <div class=\"klc-section-head\">\n      <div class=\"klc-section-eyebrow\">Mata Pelajaran<\u002Fdiv>\n      <h2>Pilihan belajar yang sudah teruji puluhan tahun<\u002Fh2>\n      <p class=\"klc-section-sub\">Dari aritmatika dasar hingga ngaji — setiap mapel punya kurikulum modul jelas, predikat penilaian transparan, dan guru tetap yang konsisten mendampingi.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"klc-mapel-grid\">\n      <div class=\"klc-mapel klc-mapel--orange\">\n        <div class=\"klc-mapel-icon\">🧮<\u002Fdiv>\n        <h4>AHE<\u002Fh4>\n        <p class=\"klc-mapel-desc\">Aritmatika cepat dengan sempoa. Anak dilatih berhitung di luar kepala.<\u002Fp>\n        <div class=\"klc-mapel-tags\"><span class=\"klc-mapel-tag\">10 modul<\u002Fspan><span class=\"klc-mapel-tag\">TK – SMP<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"klc-mapel klc-mapel--sage\">\n        <div class=\"klc-mapel-icon\">📐<\u002Fdiv>\n        <h4>ASE<\u002Fh4>\n        <p class=\"klc-mapel-desc\">Aljabar &amp; persiapan ujian sekolah. Latihan rutin, evaluasi per modul.< n belum lancar, kami mulai dari modul perkalian dasar. Tidak ada gengsi-gengsi — yang penting tuntas.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"klc-faq-item\">\n        <div class=\"klc-faq-q\">Bagaimana saya tahu anak benar-benar belajar, bukan sekadar duduk?<span class=\"toggle\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"klc-faq-a\">Setiap minggu Anda dapat link laporan via WhatsApp: posisi modul anak, predikat tiap bab, catatan guru, dan persentase kehadiran. Kalau ada yang janggal, langsung balas chat — admin pasti respon.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"klc-faq-item\">\n        <div class=\"klc-faq-q\">Kalau anak sakit / izin, bagaimana?<span class=\"toggle\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"klc-faq-a\">Sesi ditandai \"Izin\" atau \"Sakit\" — tidak menambah biaya, dan kami atur sesi pengganti di hari lain pada minggu yang sama. Kalau sesi belum tuntas dipahami, guru akan ulang materinya.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"klc-faq-item\">\n        <div class=\"klc-faq-q\">Saya pindah kota karena pekerjaan. Anak saya bagaimana?<span class=\"toggle\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"klc-faq-a\">Cukup lapor admin cabang lama. Modul, predikat, dan tarif lock anak otomatis ikut ke cabang baru. Tidak ada biaya pindah, tidak perlu daftar ulang.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"klc-faq-item\">\n        <div class=\"klc-faq-q\">Apakah ada diskon kalau ambil 2 mapel?<span class=\"toggle\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"klc-faq-a\">Ya. Mapel kedua dapat potongan 10%, mapel ketiga 15%. Untuk saudara kandung yang ikut, tambahan diskon 10% per anak.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"klc-faq-item\">\n        <div class=\"klc-faq-q\">Bagaimana cara coba gratis 1 sesi?<span class=\"toggle\">+<\u002Fspan><\u002Fdiv>\n        <div class=\"klc-faq-a\">Klik tombol \"Coba Gratis\" di atas, isi nama anak, kelas, dan mapel yang diminati. Admin cabang akan menghubungi via WhatsApp dalam 24 jam untuk atur jadwal.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== FINAL CTA ============== -->\n<section class=\"klc-section\" id=\"daftar\" style=\"padding-top:0; padding-bottom:96px;\">\n  <div class=\"klc-finalcta\">\n    <h2>Coba dulu 1 sesi — gratis, tanpa kewajiban<\u002Fh2>\n    <p>Anak Anda diajar 1 sesi penuh, Anda terima laporan progress pertama via WhatsApp. Tidak cocok? Tidak masalah. Cocok? Lanjut ke pendaftaran reguler.<\u002Fp>\n    <div class=\"klc-finalcta-cta\">\n      <a href=\"#\" class=\"klc-btn klc-btn--white klc-btn--lg\">Daftar Coba Gratis →<\u002Fa>\n      <a href=\"#\" class=\"klc-btn klc-btn--wa klc-btn--lg\" style=\"background:#25D366;color:white;\">Tanya via WhatsApp<\u002Fa>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ============== FOOTER ============== -->\n<footer>\n  <div class=\"klc-container klc-footer\">\n    <div class=\"klc-footer-grid\">\n      <div>\n        <div class=\"klc-logo\">\n          <div class=\"klc-logo-mark\">K<\u002Fdiv>\n          <div>KLC Bimbel<small>Keluarga · Belajar · Tuntas<\u002Fsmall><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"font-size:14px;color:var(--klc-ink-2);margin-top:16px;line-height:1.6;max-width:340px;\">Bimbel keluarga sejak 2014. Mendampingi anak Indonesia tuntas memahami pelajaran, modul demi modul.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <h5>Mata Pelajaran<\u002Fh5>\n        <ul>\n          <li><a href=\"#mapel\">AHE — Aritmatika<\u002Fa><\u002Fli>\n          <li><a href=\"#mapel\">ASE — Aljabar<\u002Fa><\u002Fli>\n          <li><a href=\"#mapel\">Matematika<\u002Fa><\u002Fli>\n          <li><a href=\"#mapel\">Les Ngaji<\u002Fa><\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <h5>Cabang<\u002Fh5>\n        <ul>\n          <li><a href=\"#cabang\">Purwakarta<\u002Fa><\u002Fli>\n          <li><a href=\"#cabang\">Bandung<\u002Fa><\u002Fli>\n          <li><a
